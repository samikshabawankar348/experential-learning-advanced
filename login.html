<!DOCTYPE html>
<html>
<head>
  <title>Login - Code Master Academy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #0d1117, #161b22);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;
    }

    .box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="box">
  <h3 class="text-center">Login</h3>

  <input id="username" class="form-control mt-3" placeholder="Enter Name">
  <input id="password" type="password" class="form-control mt-2" placeholder="Enter Password">

  <button class="btn btn-primary w-100 mt-3" onclick="login()">
    Login
  </button>
</div>

<script>
function login() {
  let name = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(name && pass) {
    localStorage.setItem("user", name);
    window.location.href = "index.html";
  } else {
    alert("Please fill all fields");
  }
}
</script>

</body>
</html>
